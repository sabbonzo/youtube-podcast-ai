name: YouTube Auto Reply with Claude AI

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:  # Allow manual triggering

jobs:
  youtube_auto_reply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-auth-oauthlib google-auth-httplib2 google-api-python-client anthropic python-dotenv

      - name: Run YouTube Auto Reply Script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: |
          python scripts/youtube_comment_ai.py

      - name: Log execution
        if: always()
        run: |
          echo "Auto-reply workflow executed at $(date)" >> workflow_log.txt
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
